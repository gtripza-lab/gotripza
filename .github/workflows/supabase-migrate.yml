name: Apply Supabase Schema (one-time)
on:
  push:
    paths:
      - '.github/workflows/supabase-migrate.yml'

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      SUPABASE_PAT: sbp_4a55d4e6f9dce4ab92d32e4a7e441c8f9be23eaf
      PROJECT_REF: ejtkmljxjqlgsyauzruo
    steps:
      - name: Apply GoTripza Schema to Supabase
        run: |
          node << 'EOF'
          const https = require('https');
          const PAT = process.env.SUPABASE_PAT;
          const REF = process.env.PROJECT_REF;

          const statements = [
            `CREATE EXTENSION IF NOT EXISTS "uuid-ossp"`,
            `CREATE TABLE IF NOT EXISTS public.users (
              id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
              email TEXT UNIQUE,
              display_name TEXT,
              locale TEXT NOT NULL DEFAULT 'ar' CHECK (locale IN ('ar','en')),
              currency TEXT NOT NULL DEFAULT 'SAR' CHECK (currency IN ('SAR','USD','AED','KWD')),
              created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
              updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
            )`,
            `CREATE TABLE IF NOT EXISTS public.search_history (
              id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
              user_id UUID REFERENCES public.users(id) ON DELETE CASCADE,
              session_id TEXT,
              query TEXT NOT NULL,
              locale TEXT NOT NULL DEFAULT 'ar',
              origin TEXT,
              destination TEXT NOT NULL,
              departure_date DATE,
              return_date DATE,
              adults INT NOT NULL DEFAULT 2,
              trip_type TEXT,
              budget_usd INT,
              wants TEXT[] DEFAULT ARRAY['flights','hotels'],
              source TEXT DEFAULT 'chat' CHECK (source IN ('chat','whitelabel','trip_page')),
              created_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
            )`,
            `CREATE TABLE IF NOT EXISTS public.saved_itineraries (
              id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
              user_id UUID REFERENCES public.users(id) ON DELETE CASCADE,
              title TEXT NOT NULL,
              locale TEXT NOT NULL DEFAULT 'ar',
              origin TEXT,
              destination TEXT NOT NULL,
              departure_date DATE,
              return_date DATE,
              adults INT NOT NULL DEFAULT 2,
              currency TEXT NOT NULL DEFAULT 'SAR',
              flight_airline TEXT, flight_number TEXT, flight_price NUMERIC(10,2),
              flight_departure_at TIMESTAMPTZ, flight_link TEXT,
              hotel_name TEXT, hotel_stars INT, hotel_price_from NUMERIC(10,2), hotel_link TEXT,
              ai_description TEXT, notes TEXT,
              is_favorite BOOLEAN NOT NULL DEFAULT FALSE,
              created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
              updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
            )`,
            `CREATE TABLE IF NOT EXISTS public.affiliate_clicks (
              id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
              user_id UUID REFERENCES public.users(id) ON DELETE SET NULL,
              session_id TEXT,
              click_type TEXT NOT NULL CHECK (click_type IN ('flight','hotel')),
              source TEXT NOT NULL DEFAULT 'chat' CHECK (source IN ('chat','whitelabel','trip_page')),
              subid TEXT, destination TEXT,
              marker TEXT NOT NULL DEFAULT '522867',
              url TEXT,
              created_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
            )`,
            `CREATE TABLE IF NOT EXISTS public.events (
              id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
              name TEXT NOT NULL,
              payload JSONB NOT NULL DEFAULT '{}'::jsonb,
              locale TEXT, path TEXT,
              created_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
            )`,
            `CREATE INDEX IF NOT EXISTS idx_search_history_user_id ON public.search_history(user_id)`,
            `CREATE INDEX IF NOT EXISTS idx_search_history_destination ON public.search_history(destination)`,
            `CREATE INDEX IF NOT EXISTS idx_search_history_created_at ON public.search_history(created_at DESC)`,
            `CREATE INDEX IF NOT EXISTS idx_saved_itineraries_user_id ON public.saved_itineraries(user_id)`,
            `CREATE INDEX IF NOT EXISTS idx_affiliate_clicks_created_at ON public.affiliate_clicks(created_at DESC)`,
            `CREATE INDEX IF NOT EXISTS events_name_created_idx ON public.events(name, created_at DESC)`,
            `CREATE OR REPLACE FUNCTION update_updated_at_column() RETURNS TRIGGER AS $$ BEGIN NEW.updated_at = NOW(); RETURN NEW; END; $$ LANGUAGE plpgsql`,
            `DROP TRIGGER IF EXISTS users_updated_at ON public.users`,
            `CREATE TRIGGER users_updated_at BEFORE UPDATE ON public.users FOR EACH ROW EXECUTE FUNCTION update_updated_at_column()`,
            `DROP TRIGGER IF EXISTS saved_itineraries_updated_at ON public.saved_itineraries`,
            `CREATE TRIGGER saved_itineraries_updated_at BEFORE UPDATE ON public.saved_itineraries FOR EACH ROW EXECUTE FUNCTION update_updated_at_column()`,
            `ALTER TABLE public.users ENABLE ROW LEVEL SECURITY`,
            `ALTER TABLE public.search_history ENABLE ROW LEVEL SECURITY`,
            `ALTER TABLE public.saved_itineraries ENABLE ROW LEVEL SECURITY`,
            `ALTER TABLE public.affiliate_clicks ENABLE ROW LEVEL SECURITY`,
            `ALTER TABLE public.events ENABLE ROW LEVEL SECURITY`,
            `DO $$ BEGIN IF NOT EXISTS (SELECT 1 FROM pg_policies WHERE tablename='users' AND policyname='users_self') THEN CREATE POLICY users_self ON public.users USING (auth.uid()=id); END IF; END $$`,
            `DO $$ BEGIN IF NOT EXISTS (SELECT 1 FROM pg_policies WHERE tablename='search_history' AND policyname='search_history_own') THEN CREATE POLICY search_history_own ON public.search_history USING (user_id=auth.uid() OR user_id IS NULL); END IF; END $$`,
            `DO $$ BEGIN IF NOT EXISTS (SELECT 1 FROM pg_policies WHERE tablename='saved_itineraries' AND policyname='saved_itineraries_own') THEN CREATE POLICY saved_itineraries_own ON public.saved_itineraries USING (user_id=auth.uid()); END IF; END $$`,
            `DO $$ BEGIN IF NOT EXISTS (SELECT 1 FROM pg_policies WHERE tablename='affiliate_clicks' AND policyname='affiliate_clicks_insert') THEN CREATE POLICY affiliate_clicks_insert ON public.affiliate_clicks FOR INSERT WITH CHECK (true); END IF; END $$`,
            `DO $$ BEGIN IF NOT EXISTS (SELECT 1 FROM pg_policies WHERE tablename='events' AND policyname='anon_insert_events') THEN CREATE POLICY anon_insert_events ON public.events FOR INSERT TO anon, authenticated WITH CHECK (true); END IF; END $$`,
          ];

          async function query(sql) {
            return new Promise((resolve) => {
              const body = JSON.stringify({ query: sql });
              const req = https.request({
                hostname: 'api.supabase.com',
                path: `/v1/projects/${REF}/database/query`,
                method: 'POST',
                headers: {
                  'Authorization': `Bearer ${PAT}`,
                  'Content-Type': 'application/json',
                  'Content-Length': Buffer.byteLength(body)
                }
              }, res => {
                let d = '';
                res.on('data', c => d += c);
                res.on('end', () => resolve({ ok: res.statusCode < 300, status: res.statusCode, body: d }));
              });
              req.on('error', e => resolve({ ok: false, error: e.message }));
              req.write(body);
              req.end();
            });
          }

          (async () => {
            let passed = 0, failed = 0;
            for (const sql of statements) {
              const r = await query(sql);
              const label = sql.trim().slice(0, 55).replace(/\s+/g,' ');
              if (r.ok) { console.log('✅', label); passed++; }
              else { console.log('❌', label, '→', r.body?.slice(0,120)); failed++; }
            }
            console.log(`\n══ Done: ${passed} OK, ${failed} failed ══`);
            if (failed > 0) process.exit(1);
          })();
          EOF
